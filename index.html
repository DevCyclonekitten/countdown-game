        <script>
            //Difficulty Stuff
            var largeNumbersPool = [];
            var generalNumbersPool = [];
            var higherNumbersPool = [];


            //global stuff
            var numbersSelected = [];
            var runningAnimation=false;
            var selectedNumber = false;
            var loop=0;
            var difficulty=10;
            var storedAnswer = "";
            var storedWeight = 0;

            var variableGameDigitsSelected = 6;
            var variableGameOutputDigits = 3;
            GameMaster();
            
            setInterval(UpdateDisplayAnimation,50);
            
            
            function ClickNumber(i,object){
                if(numbersSelected.length>=6) return;
                if(object.innerText=="[-]"){
                    if(object.classList.contains("row-1")){
                        let r = randomElement(largeNumbersPool);
                        largeNumbersPool=r[1];
                        numbersSelected.push(r[0]);
                    }
                    if(object.classList.contains("row-2")){
                        let r = randomElement(generalNumbersPool);
                        generalNumbersPool=r[1];
                        numbersSelected.push(r[0]);
                    }
                    if(object.classList.contains("row-3")){
                        let r = randomElement(higherNumbersPool);
                        higherNumbersPool=r[1];
                        numbersSelected.push(r[0]);
                    }
                    object.innerText="[0]";
                    object.classList.remove("node-selection");
                    object.classList.add("node-selection-activated");
                    UpdateNumbersBox();
                }
            }

            function SelectAnswer(){
                if(numbersSelected.length<6) return;
                CreateAnswer();
            }
            
            function ShowAnswer(){
                alert(storedAnswer);
            }
            

            






            

            
        </script>
